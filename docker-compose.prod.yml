version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mapo_backend_prod
    restart: always # 프로덕션 자동 재시작
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DB_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      # ... (기타 환경변수는 .env에서 자동으로 주입됨)
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - ./validation:/app/validation
      - ./models:/app/models
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # 프론트엔드 빌드 최적화를 위한 arg들 추가 가능
    container_name: mapo_frontend_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"  # 향후 SSL 적용 시 사용
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: mapo_redis_prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
